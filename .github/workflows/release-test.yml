name: release-test

# Manual-only workflow for dry-run publishing to TestPyPI.
# Use this to validate packaging changes before tagging a real release.
#
# Trigger from the Actions tab: "release-test" → Run workflow.
# Requires a TestPyPI pending publisher configured at
# https://test.pypi.org/manage/account/publishing/ pointing at this
# workflow filename (release-test.yml).

on:
  workflow_dispatch:

jobs:
  publish-testpypi:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build

      - name: Build sdist and wheel
        run: python -m build

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
