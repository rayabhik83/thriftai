# Pricing snapshot for benchmark dollar calculations.
#
# All prices are in USD per 1,000,000 tokens.
# Source: Anthropic public pricing page, pulled 2026-05-19.
# Source URL: https://www.anthropic.com/pricing#anthropic-api
#
# Every dollar figure in the published REPORT.md is computed from this file
# multiplied by the raw token counts in benchmarks/results/raw/*/calls.jsonl.
# We do NOT use litellm.completion_cost — see benchmarks/README.md for why.
#
# To refresh: bump pulled_on, update entries, and re-run `make rederive`.

pulled_on: "2026-05-19"
source_url: "https://www.anthropic.com/pricing#anthropic-api"

# Models under test in the benchmark.
models:
  claude-haiku-4-5:
    input_per_million_usd: 0.25
    output_per_million_usd: 1.25

  claude-sonnet-4-6:
    input_per_million_usd: 3.00
    output_per_million_usd: 15.00

  # Judge only — not in the under-test set when used as judge.
  claude-opus-4-7:
    input_per_million_usd: 15.00
    output_per_million_usd: 75.00

# Embedding model used by ThriftAI's semantic cache. Counted toward
# overhead in cost crossover math.
embeddings:
  voyage-3:
    input_per_million_usd: 0.06

# ---- Future / one-line provider swap ------------------------------------
# Uncomment and supply OPENAI_API_KEY / TOGETHER_API_KEY in .env to run
# against alternate providers; LiteLLM handles the routing transparently.
