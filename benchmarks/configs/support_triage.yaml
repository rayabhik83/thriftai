workload: support_triage

description: |
  Three-agent pipeline (classifier, retriever, drafter) processing
  customer-support tickets. Ticket corpus has intentional repetition
  across clusters (paraphrastic variants of the same complaint)
  to exercise the semantic cache.

data_file: benchmarks/data/support_tickets.jsonl

# Default model used for under-test agents when --model isn't passed.
default_model: claude-haiku-4-5

# Conditions to run for this workload. The runner iterates over these
# in order. Cache directories are scoped per (condition, seed).
conditions:
  - baseline
  - thriftai_cold
  - thriftai_warm

# ThriftAI session config used by thriftai_* conditions. Per
# Session.__init__ in thriftai/session.py.
#
# embedding_model defaults to null = semantic cache OFF. This keeps the
# benchmark Anthropic-only (no Voyage/OpenAI/Together key needed). The
# benchmark measures the exact cache + replay paths only — see
# README.md "What does and does not ship" + this null caveat.
#
# To enable semantic-cache measurement: set embedding_model to a
# LiteLLM-compatible embedding model and provide its API key in .env.
thriftai_session:
  embedding_model: null
  semantic_threshold: 0.92
  semantic_min_chars: 100
  semantic_bucket_size: 1000
